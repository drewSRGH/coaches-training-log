<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach's Pub & Grill — Kitchen Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f0f;
    --surface: #161818;
    --surface2: #1e2020;
    --surface3: #252828;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --text2: #9a9690;
    --text3: #5c5a57;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
    --green: #4caf7d;
    --green-dim: rgba(76,175,125,0.12);
    --amber: #e09a3a;
    --amber-dim: rgba(224,154,58,0.12);
    --red: #e05252;
    --red-dim: rgba(224,82,82,0.12);
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 6px;
    --radius-lg: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,15,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 2rem;
    height: 56px;
    gap: 2rem;
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--gold);
    white-space: nowrap;
  }

  .nav-tabs {
    display: flex;
    gap: 0;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    padding: 0 1rem;
    height: 56px;
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: var(--font-body);
  }

  .nav-tab:hover { color: var(--text2); }
  .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* MAIN */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HERO */
  .hero {
    padding: 2.5rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1;
    letter-spacing: 0.02em;
    margin-bottom: 0.75rem;
  }

  .hero-sub {
    color: var(--text2);
    font-size: 14px;
    max-width: 480px;
  }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
    position: relative;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: var(--font-mono);
    margin-bottom: 0.5rem;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 34px;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 0.25rem;
  }

  .stat-green { color: var(--green); }
  .stat-amber { color: var(--amber); }
  .stat-red { color: var(--red); }
  .stat-gold { color: var(--gold); }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* PANELS */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .panel-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .panel-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .panel-body { padding: 1.25rem; }

  /* SECTION TITLES */
  .section-title {
    font-family: var(--font-display);
    font-size: 24px;
    letter-spacing: 0.03em;
    margin-bottom: 1rem;
    margin-top: 2rem;
  }

  /* SEARCH & FILTER */
  .toolbar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  input[type="text"], select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 0.5rem 0.75rem;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, select:focus { border-color: var(--gold); }
  input[type="text"] { flex: 1; min-width: 200px; }
  select option { background: #1a1a1a; }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border2);
  }

  th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-weight: 500;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
  }

  th.right, td.right { text-align: right; }

  td {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }

  tbody tr:last-child td { border-bottom: none; }

  tbody tr:hover { background: var(--surface2); }

  .td-name {
    font-weight: 500;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .td-cat {
    color: var(--text3);
    font-size: 12px;
    white-space: nowrap;
  }

  .td-mono {
    font-family: var(--font-mono);
    font-size: 12px;
  }

  /* FC BADGES */
  .fc-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .fc-good { background: var(--green-dim); color: var(--green); }
  .fc-warn { background: var(--amber-dim); color: var(--amber); }
  .fc-bad  { background: var(--red-dim);   color: var(--red); }

  /* CATEGORY BAR CHART — custom horizontal bars */
  .cat-bars { display: flex; flex-direction: column; gap: 10px; }

  .cat-row {
    display: grid;
    grid-template-columns: 130px 1fr 55px;
    align-items: center;
    gap: 12px;
  }

  .cat-label { font-size: 12px; color: var(--text2); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .cat-bar-track {
    height: 20px;
    background: var(--surface3);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .cat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(.22,1,.36,1);
  }

  .cat-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* INGREDIENT LIST */
  .ingredient-list { display: flex; flex-direction: column; gap: 6px; }

  .ing-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: var(--radius);
    gap: 1rem;
  }

  .ing-name { color: var(--text2); flex: 1; }
  .ing-qty { color: var(--text3); font-family: var(--font-mono); font-size: 11px; }
  .ing-cost { font-family: var(--font-mono); font-size: 11px; color: var(--gold); }

  /* MODAL */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }

  .modal-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }

  .modal-title { font-family: var(--font-display); font-size: 26px; letter-spacing: 0.02em; line-height: 1.1; }
  .modal-cat { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; }

  .modal-close {
    background: var(--surface3);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    color: var(--text2);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .modal-close:hover { background: var(--surface3); color: var(--text); }

  .modal-body { padding: 1.25rem 1.5rem; }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }

  .modal-stat {
    background: var(--surface2);
    padding: 0.75rem 1rem;
    text-align: center;
  }

  .modal-stat-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .modal-stat-value { font-family: var(--font-display); font-size: 22px; }

  /* INVENTORY TABLE */
  .inv-section-header {
    padding: 0.5rem 1rem;
    background: var(--surface3);
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* MARCH REPORT */
  .report-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.5rem;
    align-items: start;
  }

  @media (max-width: 900px) { .report-grid { grid-template-columns: 1fr; } }

  /* SPARKLINE effect */
  .profit-bar {
    display: inline-block;
    height: 4px;
    border-radius: 2px;
    vertical-align: middle;
    margin-left: 6px;
  }

  /* UTILITY */
  .text-green { color: var(--green); }
  .text-amber { color: var(--amber); }
  .text-red   { color: var(--red); }
  .text-gold  { color: var(--gold); }
  .text-muted { color: var(--text3); }
  .mb-1 { margin-bottom: 1rem; }
  .mb-2 { margin-bottom: 2rem; }
  .mt-1 { margin-top: 1rem; }
  .flex { display: flex; }
  .gap-1 { gap: 0.5rem; }
  .items-center { align-items: center; }
